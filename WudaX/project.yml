name: WudaX
options:
  bundleIdPrefix: com.wudax
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: 2.25.9
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MGJM75MGDG
targets:
  WudaX:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wudax.app
        INFOPLIST_KEY_CFBundleDisplayName: WUDAX
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
