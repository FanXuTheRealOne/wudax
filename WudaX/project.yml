name: WudaX
options:
  bundleIdPrefix: com.wudax
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: 2.25.9
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MGJM75MGDG
targets:
  WudaX:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: BundledModel/LLMModel
        type: folder
    dependencies:
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wudax.app
        INFOPLIST_KEY_CFBundleDisplayName: WUDAX
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WudaXTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - Fixtures
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: WudaX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wudax.app.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WudaX.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WudaX"
        BUNDLE_LOADER: "$(TEST_HOST)"
